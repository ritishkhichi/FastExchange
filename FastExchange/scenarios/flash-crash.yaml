name: flash-crash
duration_sec: 120
seed: 42

symbols:
  - ABC
  - XYZ
  - TECH

tick_size: 0.0001

initial_mid_prices:
  ABC: 105.0000
  XYZ: 42.5000
  TECH: 880.0000

strategy: flash-crash

workload:
  arrival_rate: 300000
  buy_probability: 0.10
  sell_probability: 0.90
  price_distribution: normal
  price_bias_ticks: -25
  quantity_distribution: poisson
  quantity_lambda: 50
  quantity_min: 1
  quantity_max: 100
  cancel_probability: 0.30
  modify_probability: 0.05

engine:
  max_order_size: 10000
  risk_plugin: default
  matching_algorithm: price_time_fifo

output:
  event_log: results/flash-crash.bin
  metrics: results/flash-crash-metrics.json
